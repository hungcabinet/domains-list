name: Generate Domain Lists
on:
  schedule:
    - cron: "10 0 * * *" # 00:10 UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  CONFIG_PATH: "/tmp/appConfig.json"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      
      - name: Install Mihomo (latest stable)
        run: |
          set -euo pipefail
          ARCH=$(dpkg --print-architecture)
          LATEST_URL=$(${{ env.CURL }} https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep -oP '"browser_download_url":\s*"\K[^"]*mihomo-linux-'"$ARCH"'-[^"]*\.deb(?=")' \
            | head -n1)
          echo "Downloading: $LATEST_URL"
          ${{ env.CURL }} -o /tmp/mihomo.deb "$LATEST_URL"
          sudo dpkg -i /tmp/mihomo.deb || sudo apt-get install -f -y
          rm -f /tmp/mihomo.deb

      - name: Install sing-box
        run: |
          set -euo pipefail
          ${{ env.CURL }} https://sing-box.app/install.sh | sudo -E sh -s -- --version 1.13.13

      - name: Write config from secret
        run: |
          echo '${{ secrets.CONFIG_CONTENT }}' > $CONFIG_PATH

      - name: Install dependencies
        run: npm install

      - name: Run generator
        run: node index.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A lists
          git diff --staged --quiet || git commit -m "Auto-update: domain lists"
          git push